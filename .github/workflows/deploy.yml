# Deploy PiX v2 to GitHub Pages using Vite
name: Deploy to GitHub Pages

on:
  push:
    branches: [v2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Legacy redirect: Casiopea wiki embeds PiX via
      # /pix/pages/app-embed/#!/import/[base64]
      # The hash portion stays client-side, so we just need
      # index.html served at that path.
      - name: Create legacy embed path
        run: |
          mkdir -p dist/pages/app-embed
          cp dist/index.html dist/pages/app-embed/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
