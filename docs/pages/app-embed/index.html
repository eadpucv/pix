<!DOCTYPE html>
<html class='embed'>
	<head>
  <!-- PiX Application -->
  <meta charset='UTF-8'/>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <link href='/pix//css/style.css' rel='stylesheet'>
  <link href='/pix//css/pix-webfont.css' rel='stylesheet'>
  <script type='text/javascript'>
  /* <![CDATA[ */
  var Ajax = {'icons':'/pix//js/icons.json'};
  /* ]]> */
  </script>
  <title>PiX Application Embed</title>
  <!-- <link rel="icon" href="/pix//favicon/favicon.ico" sizes="any" />
<link rel="icon" href="/pix//favicon/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/pix//favicon/apple-touch-icon.png" />
<link rel="manifest" href="/pix//favicon/manifest.webmanifest" /> -->

<link rel="icon" href="/pix/favicon/favicon.ico" sizes="any" />
<link rel="icon" href="/pix/favicon/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/pix/favicon/apple-touch-icon.png" />
<link rel="manifest" href="/pix/favicon/manifest.webmanifest" />
</head>



	<body lang='ES_es'>
		<div class='container pix-app'>
			<body class="embed">
   <h1 class="score-header"><input placeholder="Name your score" /></h1>
    <textarea class="score-description" placeholder="Describe your score" rows="1"></textarea>


<div id="pix-template">
    <!-- Handlebars template-->
</div>

<script id="layout-score" type="text/x-handlebars-template">

    <div class='pix-score template-pix'>
         <ul class='pix-header'>
            <li class='block block-user'><div class='pix-group'><i class='pix pix-person'></i><label>person</label></div></li>
            <li class='block block-dialogue'><div class='pix-group'><i class='pix pix-dialogue'></i><label>dialogue</label></div></li>
            <li class='block block-system'><div class='pix-group'><i class='pix pix-system'></i><label>system</label></div></li>
        </ul>
        <div class="step-mask">
            <ul class='pix-steps'>
            
                {{{step}}} 
            
            </ul>
        </div>
    </div>
</script>

<script id="service-score" type="text/x-handlebars-template">
    <div class='pix-score template-blueprint'>
         <ul class='pix-header'>
         <li class='block block-enviroment'><div class='pix-group'><i class='pix pix-body'></i><label>enviroment</label></div></li>
            <li class='block block-user'><div class='pix-group'><i class='pix pix-person'></i><label>person</label></div></li>
            <li class='block block-dialogue'><div class='pix-group'><i class='pix pix-dialogue'></i><label>dialogue</label></div></li>
            <li class='block block-system'><div class='pix-group'><i class='pix pix-system'></i><label>system</label></div></li>
            <li class='block block-supporting-processes'><div class='pix-group'><i class='pix pix-process'></i><label>supporting processes</label></div></li>
        </ul>
        <div class="step-mask">
            <ul class='pix-steps'>
            
                {{{step}}} 
            
            </ul>
        </div>
    </div>
</script>

<script id="layout-score-no-header" type="text/x-handlebars-template">
    <div class='pix-score'>
        <ul class='pix-steps'>
        
            {{{step}}} 
        
        </ul>
    </div>
</script>
<script id="pix-service-step" type="text/x-handlebars-template">
    <li class='pix-step'>
        <textarea class="note top" rows='1' placeholder='type here...'>{{{step_title}}}</textarea>
        <div class="fly-link top">
            <a href="#split" class="btn btn-tools tool-split" title="split score"><img src='/pix//img/tool_split.svg'></a>
            <a href="#remove" class="btn btn-tools tool-remove" title="remove step"><img src='/pix//img/tool_remove.svg'></a>
            <a href="#add" class="btn btn-tools tool-add" title="add step"><img src='/pix//img/tool_add.svg'></a>
        </div>
        <ul>
            <li class='block block-enviroment'>
                <textarea rows='10' placeholder='type here...'></textarea>
                <div class="pix-div-input" contenteditable="true">{{{enviroment}}}</div>
            </li>
            <li class='block block-user'>
                <textarea rows='10' placeholder='type here...'></textarea>
                <div class="pix-div-input" contenteditable="true">{{{user}}}</div>
            </li>
            <li class='block block-dialogue'>
                <textarea rows='10' placeholder='type here...'></textarea>
                <div class="pix-div-input" contenteditable="true">{{{dialogue}}}</div>
            </li>
            <li class='block block-system'>
                <textarea rows='10' placeholder='type here...'></textarea>
                <div class="pix-div-input" contenteditable="true">{{{system}}}</div>
            </li>
            <li class='block block-supporting_processes'>
                <textarea rows='10' placeholder='type here...'></textarea>
                <div class="pix-div-input" contenteditable="true">{{{supporting_processes}}}</div>
            </li>
        </ul>
        <div class="fly-link bottom">
            <a href="#add-note" class="btn btn-xs btn-tools tool-note" title="add note"><img src='/pix//img/tool_nota.svg'></a>
        </div>
            <textarea class="note bottom" rows='10' placeholder='type here...'>{{{note}}}</textarea>
    </li>
</script>
<script id="pix-step" type="text/x-handlebars-template">
    <li class='pix-step'>
        <textarea class="note top" rows='1' placeholder='type here...'>{{{step_title}}}</textarea>
        <div class="fly-link top">
            <a href="#split" class="btn btn-tools tool-split" title="split score"><img src='/pix//img/tool_split.svg'></a>
            <a href="#remove" class="btn btn-tools tool-remove" title="remove step"><img src='/pix//img/tool_remove.svg'></a>
            <a href="#add" class="btn btn-tools tool-add" title="add step"><img src='/pix//img/tool_add.svg'></a>
        </div>
        <ul>
            <li class='block block-user'>
                <textarea rows='10' placeholder='type here...'></textarea>
                <div class="pix-div-input" contenteditable="true">{{{user}}}</div>
            </li>
            <li class='block block-dialogue'>
                <textarea rows='10' placeholder='type here...'></textarea>
                <div class="pix-div-input" contenteditable="true">{{{dialogue}}}</div>
            </li>
            <li class='block block-system'>
                <textarea rows='10' placeholder='type here...'></textarea>
                <div class="pix-div-input" contenteditable="true">{{{system}}}</div>
            </li>
        </ul>
        <div class="fly-link bottom">
            <a href="#add-note" class="btn btn-xs btn-tools tool-note" title="add note"><img src='/pix//img/tool_nota.svg'></a>
        </div>
            <textarea class="note bottom" rows='10' placeholder='type here...'>{{{note}}}</textarea>
    </li>
</script>
</body>

		</div>
	    <script type="text/javascript" src="/pix//js/jquery.min.js"></script>
	    <script type="text/javascript" src="/pix//js/handlebars.min.js"></script>
		<script type="text/javascript" src="/pix//js/app.js"></script>
	</body>
</html>
